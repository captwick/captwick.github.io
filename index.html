<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Eid Mubarak ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    height:100vh;
    background: radial-gradient(circle at top,#ffd6e7,#ff6fa9,#ff4d94);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* OPENING SCREEN */
.opening{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9ec7,#ff4d94);
    z-index:999;
    transition:1s ease;
}

.open-heart{
    font-size:80px;
    animation:beat 1.5s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

.open-btn{
    margin-top:20px;
    padding:18px 35px;
    border:none;
    border-radius:999px;
    background:white;
    color:#ff2f86;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
}

/* MAIN */
.main{
    display:none;
    width:100%;
    height:100vh;
    overflow:auto;
    position:relative;
    padding:20px;
    padding-top:200px;
    padding-bottom:120px;
}

/* 2 FLOATING FRAMES */
.floating-photo{
    position:absolute;
    width:34vw;
    max-width:160px;
    height:34vw;
    max-height:160px;
    border-radius:24px;
    overflow:hidden;
    border:4px solid rgba(255,255,255,0.4);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    animation:float 6s ease-in-out infinite;
    z-index:1;
}

.floating-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:opacity 0.8s ease;
}

/* positions */
.f1{top:80px;left:15px;}
.f2{top:80px;right:15px;animation-delay:2s;}

@keyframes float{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-15px);}
}

/* CARD */
.card{
    max-width:420px;
    margin:auto;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:25px;
    text-align:center;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    position:relative;
    z-index:10;
}

.title{
    font-family:'Great Vibes',cursive;
    font-size:60px;
}

/* EDIT THIS PARAGRAPH */
.message{
    margin-top:15px;
    line-height:2;
    font-size:14px;
}

/* HEARTS */
.heart{
    position:fixed;
    color:white;
    animation:rise linear infinite;
    z-index:0;
}

@keyframes rise{
    from{transform:translateY(100vh);opacity:0;}
    to{transform:translateY(-100px);opacity:1;}
}

</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="opening">
    <div class="open-heart">💖</div>
    <button class="open-btn" onclick="openCard()">Tap To Open ✨</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

    <!-- 2 FLOATING FRAMES -->
    <div class="floating-photo f1"><img id="img1"></div>
    <div class="floating-photo f2"><img id="img2"></div>

    <!-- CARD -->
    <div class="card">

        <div class="title">Eid Mubarak ❤️</div>

        <div class="message">
            My love, every moment with you feels like a beautiful dream I never want to wake up from.<br>
            You bring peace, happiness, and warmth into my life in ways I can’t fully explain.<br>
            This Eid, I just want you to know how deeply special you are to me ❤️
        </div>

    </div>

</div>

<script>

/* OPEN */
function openCard(){
    document.getElementById("opening").style.opacity="0";
    setTimeout(()=>{
        document.getElementById("opening").style.display="none";
        document.getElementById("main").style.display="block";
        document.body.style.overflow="auto";
    },900);
}

/* HEARTS */
for(let i=0;i<40;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*18+10)+"px";
    h.style.animationDuration=(Math.random()*6+4)+"s";
    document.body.appendChild(h);
}

/* 15 PHOTOS */
const photos = [
 "photo1.jpeg","photo2.jpeg","photo3.jpeg",
 "photo4.jpeg","photo5.jpeg","photo6.jpeg",
 "photo7.jpeg","photo8.jpeg"
];

const frames = [
 document.getElementById("img1"),
 document.getElementById("img2")
];

let current = [];

/* initial setup */
for(let i=0;i<frames.length;i++){
    frames[i].src = photos[i];
    current[i] = photos[i];
}

/* random non-repeat */
function getRandom(exclude){
    let available = photos.filter(p => !exclude.includes(p));
    return available[Math.floor(Math.random()*available.length)];
}

/* rotate every 5 seconds */
setInterval(()=>{

    frames.forEach((img,i)=>{

        let newPic = getRandom(current);

        current[i] = newPic;

        img.style.opacity = 0;

        setTimeout(()=>{
            img.src = newPic;
            img.style.opacity = 1;
        },400);

    });

},5000);

</script>

</body>
</html>
