<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Eid Mubarak ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:black;
    overflow:hidden;
}

/* STORY CONTAINER */
.story{
    width:100vw;
    height:100vh;
    position:relative;
}

/* SLIDES */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 0.6s ease;
}

.slide.active{
    opacity:1;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY GRADIENT */
.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 60%);
}

/* TEXT ON LAST SLIDE */
.messageBox{
    position:absolute;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    width:85%;
    color:white;
    text-align:center;
}

.title{
    font-family:'Great Vibes',cursive;
    font-size:50px;
    margin-bottom:10px;
}

.text{
    font-size:14px;
    line-height:1.8;
}

/* PROGRESS BAR */
.progress{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    gap:5px;
}

.bar{
    flex:1;
    height:3px;
    background:rgba(255,255,255,0.3);
    border-radius:5px;
    overflow:hidden;
}

.bar div{
    height:100%;
    width:0%;
    background:white;
    transition:width 0.3s linear;
}

</style>
</head>

<body>

<div class="story" id="story">

    <!-- PROGRESS -->
    <div class="progress" id="progress"></div>

    <!-- 8 IMAGE SLIDES -->
    <div class="slide active"><img src="photo1.jpeg"></div>
    <div class="slide"><img src="photo2.jpeg"></div>
    <div class="slide"><img src="photo3.jpeg"></div>
    <div class="slide"><img src="photo4.jpeg"></div>
    <div class="slide"><img src="photo5.jpeg"></div>
    <div class="slide"><img src="photo6.jpeg"></div>
    <div class="slide"><img src="photo7.jpeg"></div>

    <!-- FINAL MESSAGE SLIDE -->
    <div class="slide">
        <img src="photo8.jpeg">

        <div class="overlay"></div>

        <div class="messageBox">

            <div class="title">Eid Mubarak ❤️</div>

            <div style="font-weight:600; margin-bottom:8px;">
                My dear XYZ ❤️
            </div>

            <div class="text">
                My love, every moment with you feels like a beautiful dream I never want to wake up from.<br>
                You bring peace, happiness, and warmth into my life in ways I can’t fully explain.<br>
                This Eid, I just want you to know how deeply special you are to me ❤️
            </div>

        </div>
    </div>

</div>

<script>

const slides = document.querySelectorAll(".slide");
const progress = document.getElementById("progress");

let index = 0;

/* build progress bars */
slides.forEach(()=>{
    let bar = document.createElement("div");
    bar.classList.add("bar");
    bar.innerHTML = "<div></div>";
    progress.appendChild(bar);
});

const bars = document.querySelectorAll(".bar div");

/* show slide */
function showSlide(i){

    slides.forEach((s,idx)=>{
        s.classList.remove("active");
        bars[idx].style.width = "0%";
    });

    slides[i].classList.add("active");
    bars[i].style.width = "100%";

}

/* auto next */
function nextSlide(){
    if(index < slides.length - 1){
        index++;
        showSlide(index);
    } else {
        index = 0;
        showSlide(index);
    }
}

/* swipe / tap controls */
document.addEventListener("click", nextSlide);

/* initial */
showSlide(0);

</script>

</body>
</html>
